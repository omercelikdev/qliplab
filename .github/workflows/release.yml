name: Release

on:
  push:
    tags:
      - "v*"

env:
  APP_NAME: QlipLab

jobs:
  # ── macOS Build ─────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build Tauri (universal)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: "--max-old-space-size=4096"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Developer ID code signing + notarization (Gatekeeper).
          # If these secrets are unset, the build is simply left unsigned.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          args: --target universal-apple-darwin

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz*
          if-no-files-found: error

  # ── Windows Build ───────────────────────────────────────────
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: "--max-old-space-size=4096"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: --target x86_64-pc-windows-msvc

      # Windows code signing: currently unsigned (SmartScreen shows
      # "More info → Run anyway"). To enable, sign the NSIS installer here
      # (e.g. Azure Trusted Signing action) before uploading artifacts.

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.sig
          if-no-files-found: error

  # ── Linux Build ─────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev

      - run: npm ci

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: "--max-old-space-size=4096"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: --target x86_64-unknown-linux-gnu

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage.sig
          if-no-files-found: error

  # ── Publish GitHub Release (this repo) ──────────────────────
  publish-release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release on this repo with the default token

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version and changelog
        id: info
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=$GITHUB_REF_NAME" >> $GITHUB_OUTPUT

          # Find previous tag
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGELOG=$(git log ${PREV_TAG}..${GITHUB_REF_NAME} --pretty=format:"- %s (%h)" --no-merges)
          fi

          # Write changelog to file
          cat > changelog.md << 'HEREDOC'
          ## What's Changed
          HEREDOC
          echo "$CHANGELOG" >> changelog.md

      - name: Flatten artifacts and generate updater manifest
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name "*.dmg" -o -name "*.msi" -o -name "*-setup.exe" -o -name "*.deb" -o -name "*.AppImage" -o -name "*.app.tar.gz" \) -exec cp {} release-files/ \;

          # Updater manifest (latest.json). NOTE: validate on the FIRST real release —
          # artifact filenames / target keys may need a tweak.
          TAG="${{ steps.info.outputs.TAG }}"
          VERSION="${{ steps.info.outputs.VERSION }}"
          BASE="https://github.com/omercelikdev/qliplab/releases/download/${TAG}"
          mac_tar=$(find artifacts -name '*.app.tar.gz' | head -1)
          win_exe=$(find artifacts -name '*-setup.exe' | head -1)
          lin_app=$(find artifacts -name '*.AppImage' | head -1)
          mac_sig=$(cat "${mac_tar}.sig" 2>/dev/null || echo "")
          win_sig=$(cat "$(find artifacts -name '*-setup.exe.sig' | head -1)" 2>/dev/null || echo "")
          lin_sig=$(cat "$(find artifacts -name '*.AppImage.sig' | head -1)" 2>/dev/null || echo "")
          jq -n \
            --arg v "$VERSION" --arg d "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg ms "$mac_sig" --arg mu "${BASE}/$(basename "$mac_tar")" \
            --arg ws "$win_sig" --arg wu "${BASE}/$(basename "$win_exe")" \
            --arg ls "$lin_sig" --arg lu "${BASE}/$(basename "$lin_app")" \
            '{version:$v, pub_date:$d, platforms:{
               "darwin-x86_64":{signature:$ms,url:$mu},
               "darwin-aarch64":{signature:$ms,url:$mu},
               "windows-x86_64":{signature:$ws,url:$wu},
               "linux-x86_64":{signature:$ls,url:$lu}
             }}' > release-files/latest.json
          ls -la release-files/
          echo "--- latest.json ---"; cat release-files/latest.json

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # This repo, default token. Non-draft + make_latest so the updater's
          # /releases/latest/download/latest.json resolves and the site's
          # "download latest" links point at this release.
          tag_name: ${{ github.ref_name }}
          name: "QlipLab ${{ steps.info.outputs.VERSION }}"
          body_path: changelog.md
          draft: false
          make_latest: true
          files: release-files/*
