name: Claude Code

on:
  # PR review - otomatik
  pull_request:
    types: [opened, synchronize, reopened]

  # @claude mention - interaktif
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  # ── PR Auto Review ──────────────────────────────────────────
  claude-pr-review:
    if: github.event_name == 'pull_request' && vars.CLAUDE_ENABLED == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      actions: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review this PR thoroughly. Check for:
            1. Tests: Every new/changed function in src/lib/ MUST have unit tests
            2. i18n: Every UI string MUST use t('key') with translations in all 15 locales
            3. RTL: Must use logical CSS (ps-/pe-, ms-/me-, text-start/text-end)
            4. Cross-platform: Must work on macOS, Windows, AND Linux
            5. No any types in src/ (except as any in tests)
            6. No console.log in production code
            7. Security: no command injection, XSS, SQL injection
            8. No breaking changes to existing functionality

            If any of these rules are violated, request changes with clear fix suggestions.
          claude_args: |
            --max-turns 10
          additional_permissions: |
            actions: read

  # ── Interactive @claude ─────────────────────────────────────
  claude-interactive:
    if: >
      vars.CLAUDE_ENABLED == 'true' &&
      (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment') &&
      contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          trigger_phrase: "@claude"
          claude_args: |
            --max-turns 20
          additional_permissions: |
            actions: read
