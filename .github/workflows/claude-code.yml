name: Claude Code

on:
  # PR review - otomatik
  pull_request:
    types: [opened, synchronize, reopened]

  # Issue analizi - label ile
  issues:
    types: [labeled, opened]

  # @claude mention - interaktif
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  # ── PR Auto Review ──────────────────────────────────────────
  claude-pr-review:
    if: github.event_name == 'pull_request' && vars.CLAUDE_ENABLED == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      actions: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this PR thoroughly. Check for:
            1. Tests: Every new/changed function in src/lib/ MUST have unit tests
            2. i18n: Every UI string MUST use t('key') with translations in all 15 locales
            3. RTL: Must use logical CSS (ps-/pe-, ms-/me-, text-start/text-end)
            4. Cross-platform: Must work on macOS, Windows, AND Linux
            5. No any types in src/ (except as any in tests)
            6. No console.log in production code
            7. Security: no command injection, XSS, SQL injection
            8. No breaking changes to existing functionality

            If any of these rules are violated, request changes with clear fix suggestions.
          claude_args: |
            --max-turns 10
          additional_permissions: |
            actions: read
      id-token: write

  # ── Issue Analysis & Fix ────────────────────────────────────
  # Triggers on: user-reported bugs/features AND auto-reported crash errors
  # Skips: consent-log issues (EULA/AI consent records)
  claude-issue-fix:
    if: >
      vars.CLAUDE_ENABLED == 'true' &&
      github.event_name == 'issues' &&
      !contains(toJSON(github.event.issue.labels.*.name), 'consent-log') &&
      (
        contains(toJSON(github.event.issue.labels.*.name), 'bug') ||
        contains(toJSON(github.event.issue.labels.*.name), 'enhancement') ||
        contains(toJSON(github.event.issue.labels.*.name), 'auto-reported')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Analyze this issue and implement a fix. Follow CLAUDE.md rules strictly.

            WORKFLOW:
            1. Understand the issue and identify affected code
            2. Check git log to see if this was previously fixed and reverted
            3. Create a fix on a new branch (fix/issue-{number} or feat/issue-{number})
            4. Write regression tests for EVERY bug fix in src/lib/*.test.ts
            5. Write unit tests for any new function in src/lib/
            6. Run npx vitest run — ALL tests must pass
            7. Run npx tsc --noEmit — ZERO errors

            i18n RULES (MANDATORY):
            - Every UI string MUST use t('key') from useTranslation()
            - Add keys to ALL 15 locale files: en, tr, ar, de, fr, es, pt, zh, ja, ko, ru, it, hi, nl, pl
            - Files: src/i18n/locales/{locale}.json
            - Never hardcode UI text in components

            CODE RULES:
            - Use logical CSS: ps-/pe- (not pl-/pr-), ms-/me-, text-start/text-end
            - Cross-platform: macOS + Windows + Linux
            - No any types, no console.log in production
            - Export DEFAULT_SETTINGS from settingsStore if testing defaults

            FINAL STEPS:
            10. Open a PR referencing this issue (Closes #{number})
            11. Include test results in PR description

            CRITICAL: Do NOT break existing functionality. Run full test suite before PR.
          claude_args: |
            --max-turns 30

  # ── Interactive @claude ─────────────────────────────────────
  claude-interactive:
    if: >
      vars.CLAUDE_ENABLED == 'true' &&
      (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment') &&
      contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@claude"
          claude_args: |
            --max-turns 20
          additional_permissions: |
            actions: read
      id-token: write
