name: Build Windows

on:
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable debug mode'
        required: false
        default: 'false'
        type: boolean

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: '--max-old-space-size=4096'
        with:
          args: --target x86_64-pc-windows-msvc

      - name: Prepare MSIX package
        shell: pwsh
        run: |
          $buildDir = "src-tauri/target/x86_64-pc-windows-msvc/release"
          $msixDir = "msix-package"
          $assetsDir = "$msixDir/Assets"

          # Create package directory
          New-Item -ItemType Directory -Force -Path $assetsDir

          # Copy main executable and dependencies
          Copy-Item "$buildDir/QlipLab.exe" "$msixDir/"

          # Copy WebView2 loader if exists
          if (Test-Path "$buildDir/WebView2Loader.dll") {
            Copy-Item "$buildDir/WebView2Loader.dll" "$msixDir/"
          }

          # Copy any other DLLs from the build
          Get-ChildItem "$buildDir/*.dll" | ForEach-Object {
            Copy-Item $_.FullName "$msixDir/"
          }

          # Copy icon assets
          Copy-Item "src-tauri/icons/Square44x44Logo.png" "$assetsDir/"
          Copy-Item "src-tauri/icons/Square150x150Logo.png" "$assetsDir/"
          Copy-Item "src-tauri/icons/Square310x310Logo.png" "$assetsDir/"
          Copy-Item "src-tauri/icons/Square71x71Logo.png" "$assetsDir/"
          Copy-Item "src-tauri/icons/Wide310x150Logo.png" "$assetsDir/"
          Copy-Item "src-tauri/icons/StoreLogo.png" "$assetsDir/"

          # Copy AppxManifest
          Copy-Item "src-tauri/AppxManifest.xml" "$msixDir/"

          # List package contents for debugging
          Write-Host "=== MSIX Package Contents ==="
          Get-ChildItem -Recurse $msixDir | ForEach-Object {
            Write-Host $_.FullName
          }

      - name: Get version from package.json
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create MSIX package
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $sdkPath = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\makeappx.exe" -Recurse | Sort-Object -Descending | Select-Object -First 1
          Write-Host "Using makeappx: $($sdkPath.FullName)"
          & $sdkPath.FullName pack /d "msix-package" /p "QlipLab_${version}_x64.msix" /o
          Write-Host "MSIX package created successfully"
          Get-Item "QlipLab_${version}_x64.msix" | Select-Object Name, Length

      - name: Upload MSIX package
        uses: actions/upload-artifact@v4
        with:
          name: qliplab-windows-msix
          path: QlipLab_*_x64.msix
          if-no-files-found: error

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: qliplab-windows-msi
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: qliplab-windows-nsis
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: warn
